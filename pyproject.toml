[project]
name = "crypto-dca"
version = "0.1.0"
description = "Long-only grid DCA trading bot for Bybit spot with pairwise loss compensation"
requires-python = ">=3.12"
dependencies = [
    "django>=5.1,<5.2",
    "djangorestframework>=3.15",
    "pybit>=5.8",
    "aiogram>=3.13",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "structlog>=24.4",
    "psycopg[binary]>=3.2",
    "redis>=5.2",
    "dj-database-url>=2.3",
    "gunicorn>=23.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-django>=4.9",
    "pytest-cov>=6.0",
    "respx>=0.21",
    "ruff>=0.8",
    "mypy>=1.13",
    "django-stubs>=5.1",
    "djangorestframework-stubs>=3.15",
    "pre-commit>=4.0",
    "fakeredis>=2.26",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E", "F", "W",  # pycodestyle + pyflakes
    "I",            # isort
    "B",            # bugbear
    "UP",           # pyupgrade
    "SIM",          # simplify
    "RUF",          # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]
"**/migrations/*" = ["E501", "RUF012", "I001"]
"**/models.py" = ["RUF012"]  # Django Meta class attrs trigger false positives
"**/serializers.py" = ["RUF012"]
"**/forms.py" = ["RUF012"]
"**/admin.py" = ["RUF012"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
exclude = ["migrations/"]

[[tool.mypy.overrides]]
module = ["pybit.*", "fakeredis.*"]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "web.settings"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "web.settings"
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "integration: tests that hit real Bybit testnet (skipped by default)",
]

[tool.coverage.run]
source = ["core"]
omit = ["*/migrations/*", "*/tests/*"]

version: 2
updates:
  # Python dependencies: the "uv" ecosystem updates pyproject.toml AND
  # regenerates uv.lock (the "pip" ecosystem only bumps pyproject.toml).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      python-deps:
        patterns:
          - "*"

  # Keep the GitHub Actions used in CI up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

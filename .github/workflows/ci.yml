name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy .

      - name: Vulture (dead code)
        run: uv run vulture

      - name: Pylint duplicate-code (DRY)
        run: >-
          uv run pylint core tgbot trader web manage.py
          --disable=all --enable=duplicate-code

      - name: Transaction checks (ACID)
        run: uv run python scripts/check_transactions.py

      - name: Import contracts (layer boundaries)
        run: uv run lint-imports

      - name: Django system checks
        run: uv run python manage.py check

      - name: Pytest (unit) + coverage floor
        run: uv run pytest -ra --ignore=tests/integration --cov

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
